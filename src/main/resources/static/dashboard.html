<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Course Planner</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        input, button { display: block; width: 100%; margin: 8px 0; padding: 8px; }
        .module { border: 1px solid #ccc; padding: 12px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Your Modules</h1>
    <button onclick="logout()">Log out</button>

    <h2>Add a Module</h2>
    <input type="text" id="moduleName" placeholder="Module name (e.g. CSC2002S)">
    <input type="number" id="moduleCreditWeight" placeholder="Credit weight">
    <input type="text" id="moduleCategory" placeholder="Category (core/elective)">
    <button onclick="createModule()">Add Module</button>

    <div id="modulesList"></div>

    <script>
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "/index.html";
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/index.html";
        }

        function loadModules() {
            fetch("/modules", {
                headers: { "Authorization": "Bearer " + token }
            })
            .then(response => response.json())
            .then(modules => {
                const list = document.getElementById("modulesList");
                list.innerHTML = "";
                modules.forEach(module => {
                    const div = document.createElement("div");
                    div.className = "module";

                    const header = document.createElement("div");
                    header.innerText = `${module.name} (${module.category}, ${module.creditWeight} credits)`;
                    header.style.cursor = "pointer";
                    header.style.fontWeight = "bold";
                    div.appendChild(header);

                    const averageText = document.createElement("span");
                    div.appendChild(averageText);

                    fetch(`/modules/${module.id}/average`, {
                        headers: { "Authorization": "Bearer " + token }
                    })
                    .then(response => response.json())
                    .then(average => {
                        averageText.innerText = ` - Average: ${average.toFixed(1)}%`;
                    });

                    const assessmentsDiv = document.createElement("div");
                    assessmentsDiv.style.display = "none";
                    assessmentsDiv.style.marginTop = "10px";
                    div.appendChild(assessmentsDiv);

                    header.onclick = function() {
                        if (assessmentsDiv.style.display === "none") {
                            loadAssessments(module.id, assessmentsDiv);
                            assessmentsDiv.style.display = "block";
                        } else {
                            assessmentsDiv.style.display = "none";
                        }
                    };

                    list.appendChild(div);
                });
            });
        }

        function createModule() {
            const name = document.getElementById("moduleName").value;
            const creditWeight = parseFloat(document.getElementById("moduleCreditWeight").value);
            const category = document.getElementById("moduleCategory").value;

            fetch("/modules", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ name, creditWeight, category })
            })
            .then(response => response.json())
            .then(() => {
                loadModules();
            });
        }

        loadModules();

        function loadAssessments(moduleId, container) {
            fetch(`/modules/${moduleId}/assessments`, {
                headers: { "Authorization": "Bearer " + token }
            })
            .then(response => response.json())
            .then(assessments => {
                container.innerHTML = "";

                assessments.forEach(assessment => {
                    const p = document.createElement("p");
                    const markText = assessment.mark === null ? "not marked" : assessment.mark + "%";
                    p.innerText = `${assessment.name} - weight: ${assessment.weight}%, mark: ${markText} `;

                    const markInput = document.createElement("input");
                    markInput.type = "number";
                    markInput.placeholder = "Set mark";
                    markInput.style.width = "80px";
                    markInput.style.display = "inline-block";

                    const setMarkButton = document.createElement("button");
                    setMarkButton.innerText = "Set";
                    setMarkButton.style.display = "inline-block";
                    setMarkButton.style.width = "auto";
                    setMarkButton.onclick = function() {
                        setMark(moduleId, assessment.id, parseFloat(markInput.value), container);
                    };

                    p.appendChild(markInput);
                    p.appendChild(setMarkButton);
                    container.appendChild(p);
                });

                const nameInput = document.createElement("input");
                nameInput.placeholder = "Assessment name";

                const weightInput = document.createElement("input");
                weightInput.type = "number";
                weightInput.placeholder = "Weight";

                const addButton = document.createElement("button");
                addButton.innerText = "Add Assessment";
                addButton.onclick = function() {
                    createAssessment(moduleId, nameInput.value, parseFloat(weightInput.value), container);
                };

                container.appendChild(nameInput);
                container.appendChild(weightInput);
                container.appendChild(addButton);
            });
        }

        function createAssessment(moduleId, name, weight, container) {
            fetch(`/modules/${moduleId}/assessments`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ name, weight })
            })
            .then(response => response.json())
            .then(() => {
                loadAssessments(moduleId, container);
            });
        }

        function setMark(moduleId, assessmentId, mark, container) {
            fetch(`/modules/${moduleId}/assessments/${assessmentId}`, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ mark })
            })
            .then(response => response.json())
            .then(() => {
                loadAssessments(moduleId, container);
                loadModules();
            });
        }
    </script>
</body>
</html>
